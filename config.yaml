# Configuration file for Daily Automated Job Search and Resume Tailoring Pipeline

search_parameters:
  titles:
    - "Software Engineer 2"
    - "Software Engineer II"
    # - "Software Engineer III"         # Captures Google L4 mid-level
    - "SDE II"
    - "SDE 2"
    - "Software Development Engineer II"
    - "Member of Technical Staff"     # Captures Salesforce/Oracle mid-level
    - "MTS 3"                         # Captures tech startup tiers
  
  # Locations to target
  locations:
    - "Bengaluru"
  
  # Target country
  country: "india"
  
  # How many search results to retrieve per title
  results_wanted: 30
  
  # Trailing hours of postings to scrape (e.g. 24 hours for daily runs)
  hours_old: 24
  
  # Maximum number of matched jobs to tailor resumes for and attach to the email per day
  max_jobs_to_tailor: 5
  
  # Bypass resume rewriting entirely and just mail matching job descriptions (can be overridden by environment variable BYPASS_REWRITING=true)
  bypass_rewriting: true
  
  # List of high-priority tier-1 companies (boosted in rankings so they are always processed first)
  tier_1_companies:
    # --- User Selections ---
    - "Google"
    - "Amazon"
    - "Microsoft"
    - "Rippling"
    - "Nutanix"
    - "Uber"
    - "Rubrik"
    # --- Elite / Top-of-Market Peer Additions ---
    - "Coinbase"
    - "Snowflake"
    - "Atlassian"
    - "Databricks"
    - "Stripe"
    - "Salesforce"
    - "ServiceNow"
    - "Adobe"
    - "Intuit"
    - "PayPal"
    - "Grab"
    # --- Elite Fintech / HFT ---
    - "Tower Research"
    - "DE Shaw"
    - "Arcesium"

email_settings:
  # SMTP server configurations
  smtp_server: "smtp.gmail.com"
  smtp_port: 587

gemini_settings:
  # The Google Gemini AI model to use for tailoring tasks
  # Pre-configured to gemini-2.0-flash, but can be changed to gemini-1.5-pro, etc.
  model_name: "gemini-2.5-flash"
