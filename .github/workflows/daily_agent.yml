name: Daily Automated Job Search Engine

on:
  repository_dispatch:
    types: [external-cron-trigger]
  workflow_dispatch:
    # Allows you to trigger the pipeline manually on-demand from the GitHub Actions tab

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for committing the processed_jobs.json state file back

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Runtime Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent runs by caching dependencies

      - name: Install System LaTeX Compiler Suite
        run: |
          sudo apt-get update
          # Install a minimal but robust TeX Live compiler setup suitable for moderncv styling
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra

      - name: Install Python Package Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Primary Orchestrator Pipeline
        env:
          # Secret Environment Variables configured inside your GitHub Repository Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: ${{ secrets.EMAIL_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SENDER: ${{ secrets.EMAIL_USERNAME }}
          RECEIVER_EMAIL: ${{ secrets.EMAIL_USERNAME }}
          BYPASS_REWRITING: false
        run: python main.py

      - name: Auto-Commit Processed Jobs Database Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update processed jobs database [skip ci]"
          file_pattern: "processed_jobs.json"
          branch: master
